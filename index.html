<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Product Management — Quantity & Total</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="container">
    <h1>Product Management</h1>

    <div class="product-card">
      <p>Unit Price: <strong id="unitPriceDisplay">1000</strong></p>

      <label for="qty">Quantity</label>
      <input type="number" id="qty" min="0" value="0" />

      <label for="totalPrice">Total Price</label>
      <input type="text" id="totalPrice" readonly value="0" />

      <p class="note">Tip: change quantity to see the total update in real-time.</p>
    </div>
  </div>

  <script src="js/script.js"></script>
</body>
</html>
